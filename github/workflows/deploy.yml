# ============================================================================
#  .github/workflows/deploy.yml
#  Recebe o repository_dispatch disparado pelo Apps Script (Code.gs),
#  baixa o .zip do Drive, descompacta e commita a pagina editada na branch main.
# ============================================================================
name: Deploy site (editor visual)

on:
  repository_dispatch:
    types: [deploy-site]        # deve casar com EVENT_TYPE do Code.gs

permissions:
  contents: write               # necessario para o GITHUB_TOKEN commitar/pushar

concurrency:
  group: deploy-site
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Info do payload
        run: |
          echo "Cliente : ${{ github.event.client_payload.client }}"
          echo "Pagina  : ${{ github.event.client_payload.page }}"
          echo "Stamp   : ${{ github.event.client_payload.timestamp }}"

      - name: Baixar o .zip (Google Drive)
        env:
          DOWNLOAD_URL: ${{ github.event.client_payload.download_url }}
        run: |
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "::error::download_url ausente no client_payload"; exit 1
          fi
          curl -sSL "$DOWNLOAD_URL" -o site.zip
          file site.zip || true
          # valida que baixou um zip de verdade (e nao uma pagina de erro/HTML do Drive)
          if ! unzip -tq site.zip >/dev/null 2>&1; then
            echo "::error::Arquivo baixado nao e um .zip valido (verifique o compartilhamento do Drive)"; exit 1
          fi

      - name: Descompactar
        run: |
          rm -rf _unzipped && mkdir _unzipped
          unzip -o site.zip -d _unzipped
          echo "--- conteudo ---"; find _unzipped -maxdepth 3 -type f | sort

      - name: Sincronizar para a raiz do repositorio
        run: |
          # O editor exporta:  web_site_official/<page>.html  +  web_site_official/images/*
          SRC="_unzipped/web_site_official"
          if [ ! -d "$SRC" ]; then SRC="_unzipped"; fi
          rsync -av --exclude='.git' "$SRC"/ ./
          rm -rf _unzipped site.zip

      - name: Commit & push
        env:
          CLIENT: ${{ github.event.client_payload.client }}
          PAGE:   ${{ github.event.client_payload.page }}
          STAMP:  ${{ github.event.client_payload.timestamp }}
        run: |
          git config user.name  "Deploy Bot (Editor Visual)"
          git config user.email "deploy-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nenhuma alteracao para commitar."; exit 0
          fi
          git commit -m "deploy: ${PAGE} — ${CLIENT} (${STAMP}) via editor visual"
          git push origin main
